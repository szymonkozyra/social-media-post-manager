---
# Namespace projektu
apiVersion: v1
kind: Namespace
metadata:
  name: social-media-prod
  labels:
    environment: production

---
# ConfigMap dla zmiennych niewrażliwych
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: social-media-prod
data:
  SPRING_DATASOURCE_IP: "db-service"
  SPRING_DATASOURCE_PORT: "5432"
  SPRING_DATASOURCE_DB: "productcataloglab"
  SPRING_DATASOURCE_USERNAME: "postgres"

---
# Secret dla zmiennych wrażliwych
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: social-media-prod
type: Opaque
data:
  # Hasło "123" zakodowane w base64
  password: MTIz

---
# PersistentVolumeClaim - trwałe przechowywanie danych z bazy
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: social-media-prod
spec:
  accessModes:
    - ReadWriteOnce # tylko 1 pod jednocześnie
  resources:
    requests:
      storage: 1Gi

---
# StatefulSet - stanowa baza danych
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-statefulset
  namespace: social-media-prod
  annotations:
    kubernetes.io/change-cause: "Wdrożenie bazy jako StatefulSet z podpiętym PVC i wstrzykniętą konfiguracją"
spec:
  serviceName: "db-service"
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: szymonkozyra/post-db:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe: # Sonda sprawdzająca, czy silnik bazy żyje
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "productcataloglab"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe: # Sonda sprawdzająca, czy można już wysyłać zapytania SQL
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "productcataloglab"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# Service - wewnętrzny punkt dostępu do bazy
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: social-media-prod
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP # baza ukryta wewnątrz klastra (brak dostępu z zewnątrz)

---
# Backend deployment (Spring Boot)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: social-media-prod
  annotations:
    kubernetes.io/change-cause: "Wdrożenie backendu Spring Boot z sondami liveness/readiness i restrykcjami non-root"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        # reguły bezpieczeństwa dla poda
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: spring-app
          image: szymonkozyra/post-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # pobieranie konfiguracji bazy danych z ConfigMap
            - name: SPRING_DATASOURCE_IP
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_IP
            - name: SPRING_DATASOURCE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_PORT
            - name: SPRING_DATASOURCE_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_DB
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_USERNAME
            # pobieranie hasła z Secret
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            # sonda sprawdzająca czy aplikacja uległa zawieszeniu (deadlock)
            httpGet:
              path: /api/v1/posts
              port: 8080
            initialDelaySeconds: 40 # czas na uruchomienie
            periodSeconds: 15
          readinessProbe:
            # sonda sprawdzająca czy aplikacja może przyjmować ruch
            httpGet:
              path: /api/v1/posts
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

---
# Backend service
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: social-media-prod
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
# ResourceQuota - Ochrona klastra przed atakami DoS i wyczerpaniem zasobów
apiVersion: v1
kind: ResourceQuota
metadata:
  name: project-quota
  namespace: social-media-prod
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi

---
# Frontend Deployment - serwer nginx (non-root)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: social-media-prod
  annotations:
    kubernetes.io/change-cause: "Wdrożenie frontendu Nginx jako non-root z sondami"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx-unprivileged domyślnie używa użytkownika o ID 101
      containers:
        - name: nginx
          image: szymonkozyra/post-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: social-media-prod
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP # zmiana z NodePort, ruch wejdzie przez Ingress

---
# Ingress - brama wejściowa do systemu
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: social-media-ingress
  namespace: social-media-prod
spec:
  rules:
    - host: post-manager.local
      http:
        paths:
          # ten ruch kierujemy do backendu
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 8080
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 8080
          # cały pozostały ruch kierujemy do frontendu
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8080